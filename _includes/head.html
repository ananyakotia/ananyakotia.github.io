<head>
  <meta name="google-site-verification" content="hxB9Z-tgGCEUPie823EalLe5XYzzMyV01r_2jkOz1vk" />
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  {% if page.robots %}
  <meta name="robots" content="{{ page.robots }}">
  {% endif %}
  
  {% if site.google_analytics and jekyll.environment == 'production' %}
  {% include analytics.html %}
  {% endif %}
  
  <title>{% if page.title %}{{ page.title }}{% else %}Kotia | Bio{% endif %}</title>
  <script>
    (function () {
      var expectedTitle = {{ page.title | default: "Kotia | Bio" | jsonify }};
      var titleElement = document.querySelector('title');
      var isRestoringTitle = false;

      function restoreTabTitle() {
        if (!titleElement || isRestoringTitle) return;

        // Force Safari to refresh a stale tab/history label, even when the
        // document already contains the expected title.
        isRestoringTitle = true;
        titleElement.textContent = expectedTitle + '\u2060';
        window.setTimeout(function () {
          titleElement.textContent = expectedTitle;
          isRestoringTitle = false;
        }, 0);
      }

      restoreTabTitle();
      window.addEventListener('load', restoreTabTitle);
      window.addEventListener('pageshow', restoreTabTitle);
      window.addEventListener('focus', restoreTabTitle);
      document.addEventListener('visibilitychange', restoreTabTitle);

      new MutationObserver(function () {
        if (!isRestoringTitle && titleElement.textContent !== expectedTitle) {
          restoreTabTitle();
        }
      }).observe(titleElement, {
        childList: true,
        characterData: true,
        subtree: true
      });
    }());
  </script>
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author.name }}">
  <meta name="HandheldFriendly" content="True">
  <meta name="MobileOptimized" content="320">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html }}{% else %}{{ site.description }}{% endif %}">
  {% if site.author.twitter_username %}
  <meta name="twitter:creator" content="{{ site.author.twitter_username }}">
  {% endif %}
  <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/images/profile.jpg" />

  <meta property="og:type" content="article">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/images/profile.jpg" />

  <link rel="apple-touch-icon" href="{{ site.baseurl }}/images/favicons/stanford-favicon.png">
  <link rel="icon" type="image/png" sizes="96x96" href="{{ site.baseurl }}/stanford-tab-icon.png">
  <link rel="icon" type="image/x-icon" sizes="32x32" href="{{ site.baseurl }}/favicon.ico">
  <link rel="manifest" href="{{ site.baseurl }}/images/favicons/manifest.json">
  <link rel="shortcut icon" href="{{ site.baseurl }}/favicon.ico">
  <meta name="msapplication-TileColor" content="#8C1515">
  <meta name="msapplication-TileImage" content="{{ site.baseurl }}/images/favicons/stanford-favicon.png">
  <meta name="theme-color" content="#ffffff">
  
  <link rel="stylesheet" href="{{ site.baseurl }}/css/main.css?{{site.time | date: '%s%N'}}">
  <link rel="canonical" href="{% if page.canonical %}{{ page.canonical }}{% else %}{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}{% endif %}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.baseurl }}/feed.xml">
  <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="{{ site.baseurl }}/css/academicons.min.css">
</head>
